<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f8f9fa;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    max-width: 400px;
    padding: 40px;
    border-radius: 10px;
    background-color: #fff;
    box-shadow: 0px 0px 20px 0px rgba(0, 0, 0, 0.1);
}

h1 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
}

.input-container {
    margin-bottom: 20px;
}

label {
    display: block;
    color: #666;
    margin-bottom: 5px;
}

input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 5px;
    background-color: #007bff;
    color: #fff;
    cursor: pointer;
    transition: background-color 0.3s;
    margin-bottom: 10px; /* Add margin-bottom to create space between buttons */
}

.btn:hover {
    background-color: #0056b3;
}

.error {
    color: red;
    margin-bottom: 10px;
}

.google-signin-container {
    text-align: center;
    margin-top: 10px; /* Add margin-top to create space between buttons */
}

.google-btn {
    background-color: #dd4b39;
    color: #fff;
    padding: 12px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
}

.google-btn:hover {
    background-color: #c23321;
}

.google-logo {
    width: 20px;
    margin-right: 10px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Login</h1>
  <form id="loginForm">
    <div id="errorMessage" class="error"></div>
    <div class="input-container">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>
    </div>
    <div class="input-container">
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" class="btn">Login</button>
    <div class="google-signin-container">
      <a href="signinwithgoogle.html"> 
      <button type="button" id="googleSignIn" class="google-btn"><img src="google-logo.png" alt="Google Logo" class="google-logo"> Sign in with Google</button>
      </a>
    </div>

    <div class="signup-container">
      <p>Don't have an account? <a href="signup.html">Sign up</a></p>
      
    </div>
  </form>
</div>

<script src="script.js"></script>

</body>
</html>
